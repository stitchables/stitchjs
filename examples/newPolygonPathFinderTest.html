  // let str = '';

  const polygon = Stitch.Geometry.createPolygon(shell, holes);

  let isZoom = false;
  let zoomScale = 3;
  let pathFinder;
  let start = { x: 800 * Math.random(), y: 800 * Math.random() };
  let end = { x: 800 * Math.random(), y: 800 * Math.random() };
  let startGeom = null;
  let endGeom = null;
  let path = null;

  function createCircle(x, y, r) {
    const shell = [];
    for (let i = 0; i < 20; i++) {
      const angle = 2 * Math.PI * i / 20;
      shell.push(new Stitch.Math.Vector(x + r * Math.cos(angle), y + r * Math.sin(angle)));
    }
    shell.push(shell[0]);
    return Stitch.Geometry.createPolygon(shell);
  }

  async function setup() {
    createCanvas(800, 800);
    await Stitch.init();
    // pathFinder = Stitch.Optimize.MATPolygonPathFinder.fromPolygon(polygon, 10);
    pathFinder = new Stitch.Optimize.PolygonPathFinder(polygon);
    startGeom = createCircle(start.x, start.y, 15);
    endGeom = createCircle(end.x, end.y, 15);
    path = pathFinder.findPath(
      // new Stitch.Math.Vector(start.x, start.y),
      // new Stitch.Math.Vector(end.x, end.y)
      startGeom, endGeom
    );
  }

  let point = null;
  function mousePressed() {
    if (dist(mouseX, mouseY, start.x, start.y) < 10) point = 'start';
    else if (dist(mouseX, mouseY, end.x, end.y) < 10) point = 'end';
  }
  function mouseDragged() {
    if (point === 'start') start = { x: mouseX, y: mouseY };
    else if (point === 'end') end = { x: mouseX, y: mouseY };
    startGeom = createCircle(start.x, start.y, 15);
    endGeom = createCircle(end.x, end.y, 15);
    path = pathFinder.findPath(
      // new Stitch.Math.Vector(start.x, start.y),
      // new Stitch.Math.Vector(end.x, end.y)
      startGeom, endGeom
    );
  }
  function mouseReleased() { point = null; }

  function keyPressed() {
    if (key === ' ') {
      isZoom = !isZoom;
    } else if (key === 'ArrowLeft') {
      zoomScale = max(zoomScale - 1, 2);
    } else if (key === 'ArrowRight') {
      zoomScale++;
    } else {
      console.log(key);
    }
  }

  async function draw() {
    background(0);

    strokeWeight(1);
    if (isZoom) {
      translate(width / 2, height / 2);
      scale(zoomScale, zoomScale);
      translate(-mouseX, -mouseY);
      strokeWeight(1 / zoomScale);
    }


    stroke(0, 255, 0);
    noFill();
    drawGeom(polygon);

    // stroke(255, 50);
    // noFill();
    // drawGeom(pathFinder.polygons);

    // stroke(255, 0, 0);
    // for (const { v, w } of pathFinder.spineGraph.edges()) {
    //   const p = pathFinder.spineGraph.node(v);
    //   const q = pathFinder.spineGraph.node(w);
    //   line(p.x, p.y, q.x, q.y);
    // }

    if (path) {
      stroke(0, 255, 255);
      drawGeom(path);
    }

    stroke(0, 255, 0);
    fill(0, 255, 0);
    circle(start.x, start.y, 5);
    stroke(255, 0, 0);
    fill(255, 0, 0);
    circle(end.x, end.y, 5);
    stroke(0, 255, 0);
    fill(0, 255, 0, 150);
    drawGeom(startGeom);
    stroke(255, 0, 0);
    fill(255, 0, 0, 150);
    drawGeom(endGeom);

    // stroke(255, 255, 0);
    // for (const ls of pathFinder.ribs) {
    //   drawGeom(ls);
    // }

  }

  function drawGeom(g) {
    let geomType = g.getGeometryType();
    if (geomType === 'MultiLineString') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'LineString' || geomType === 'LinearRing') {
      beginShape();
      for (let i = 0, n = g.getNumPoints(); i < n; i++) {
        const p = g.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      endShape();
    } else if (geomType === 'Polygon') {
      const shell = g.getExteriorRing();
      beginShape();
      for (let i = 0, n = shell.getNumPoints(); i < n; i++) {
        const p = shell.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      for (let i = 0, n = g.getNumInteriorRing(); i < n; i++) {
        const hole = g.getInteriorRingN(i);
        beginContour();
        for (let j = 0, m = hole.getNumPoints(); j < m; j++) {
          const p = hole.getPointN(j);
          vertex(p.getX(), p.getY());
        }
        endContour(CLOSE);
      }
      endShape(CLOSE);
    } else if (geomType === 'GeometryCollection') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'Point') {
      const coord = g.getCoordinate();
      circle(coord.x, coord.y, 5);
    } else if (geomType === 'MultiPolygon') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    }
    else {
      console.log(`Unrecognized Geometry Type: ${geomType}`);
    }
  }
