  let autoRoute, stitches;

  async function setup() {
    createCanvas(800, 800);
    await Stitch.init();
    // autoRoute = autoRuns[0].getUnderlayAutoRoute(5, autoRouteOptions);
    try {

      const topRuns = [];
      for (let p of autoRouteOptions.travelPolygons) {
        const polygon = { shell: [] };
        for (let i = 0; i < p.shell.length; i++) {
          polygon.shell.push(new Stitch.Math.Vector(p.shell[i].x, p.shell[i].y));
        }
        topRuns.push(new Stitch.Core.RoutedRuns.RoutedFill(polygon, { angle: Math.PI * rng.random_dec() }));
      }
      const topThread = pattern.addThread(0, 0, 0);
      if (topRuns.length > 0) {
        const topAutoRoute = new Stitch.Core.RoutedRuns.AutoRoute(topRuns, {
          entry: new Stitch.Math.Vector(0, 0),
          exit: new Stitch.Math.Vector(800, 800)
        });
        topThread.addRun(topAutoRoute);
      }

      autoRoute = new Stitch.Core.RoutedRuns.AutoRoute(autoRuns, autoRouteOptions);
      thread.addRun(autoRoute);
      stitches = autoRoute.getStitches(5);
    } catch (e) {
      console.error(e);
    }
  }

  function drawGeom(g) {
    let geomType = g.getGeometryType();
    if (geomType === 'MultiLineString') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'LineString' || geomType === 'LinearRing') {
      beginShape();
      for (let i = 0, n = g.getNumPoints(); i < n; i++) {
        const p = g.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      endShape();
    } else if (geomType === 'Polygon') {
      const shell = g.getExteriorRing();
      beginShape();
      for (let i = 0, n = shell.getNumPoints(); i < n; i++) {
        const p = shell.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      for (let i = 0, n = g.getNumInteriorRing(); i < n; i++) {
        const hole = g.getInteriorRingN(i);
        beginContour();
        for (let j = 0, m = hole.getNumPoints(); j < m; j++) {
          const p = hole.getPointN(j);
          vertex(p.getX(), p.getY());
        }
        endContour(CLOSE);
      }
      endShape(CLOSE);
    } else if (geomType === 'GeometryCollection') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'Point') {
      const coord = g.getCoordinate();
      circle(coord.x, coord.y, 5);
    } else if (geomType === 'MultiPolygon') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    }
    else {
      console.log(`Unrecognized Geometry Type: ${geomType}`);
    }
  }
