<!doctype html>
<html>
<head>
  <title>AutoFill Example</title>
  <script src="../dist/stitch.global.js"></script>
  <script>window.Stitch || document.write('<script src="https://unpkg.com/@stitchables/stitchjs/dist/stitch.global.js">\x3C/script>')</script>
<!--  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.5/lib/p5.js"></script>-->
</head>
<body>
<script>

  let pattern = new Stitch.Core.Pattern(800, 800);

  let thread = pattern.addThread(200, 0, 0);

  const autoRuns = [];
  const radius = 0.9 * Math.min(pattern.widthPx, pattern.heightPx) / 6;
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      const cx = Stitch.Math.Utils.map(i, 0, 3, 0, pattern.widthPx) + pattern.widthPx / 6;
      const cy = Stitch.Math.Utils.map(j, 0, 3, 0, pattern.heightPx) + pattern.heightPx / 6;
      const angleOffset = 0.5 * Math.PI * Math.random();
      const shell = new Stitch.Math.Polyline(true);
      for (let k = 0; k < 4; k++) {
        const angle = Stitch.Math.Utils.map(k, 0, 4, 0, 2 * Math.PI) + angleOffset;
        shell.addVertex(radius * Math.cos(angle) + cx, radius * Math.sin(angle) + cy);
      }
      shell.addVertex(shell.vertices[0].x, shell.vertices[0].y);
      autoRuns.push(new Stitch.Core.RoutedRuns.RoutedFill(shell.vertices, [], { rowSpacingMm: 0.4, travelLengthMm: 3 }));
    }
  }

  // const [x0, x1, x2, x3] = [0.05 * pattern.widthPx, 1 / 3 * pattern.widthPx, 2 / 3 * pattern.widthPx, 0.95 * pattern.widthPx];
  // const [y0, y1, y2, y3] = [0.05 * pattern.heightPx, 1 / 3 * pattern.heightPx, 2 / 3 * pattern.heightPx, 0.95 * pattern.heightPx];
  // thread.addRun(new Stitch.Core.Runs.Satin(Stitch.Math.Polyline.fromObjects([{ x: x1, y: y0 }, { x: x1, y: y3 }]), 4, 0.2));
  // thread.addRun(new Stitch.Core.Runs.Satin(Stitch.Math.Polyline.fromObjects([{ x: x2, y: y0 }, { x: x2, y: y3 }]), 4, 0.2));
  // thread.addRun(new Stitch.Core.Runs.Satin(Stitch.Math.Polyline.fromObjects([{ y: y1, x: x0 }, { y: y1, x: x3 }]), 4, 0.2));
  // thread.addRun(new Stitch.Core.Runs.Satin(Stitch.Math.Polyline.fromObjects([{ y: y2, x: x0 }, { y: y2, x: x3 }]), 4, 0.2));

  const autoRoute = new Stitch.Core.RoutedRuns.AutoRoute(autoRuns, new Stitch.Math.Vector(0, 0), new Stitch.Math.Vector(pattern.widthPx, pattern.heightPx));
  thread.addRun(autoRoute);

  let canvas = Stitch.Graphics.getCanvas(pattern, window.innerWidth, window.innerHeight, 3);
  canvas.setAttribute('style', 'margin: auto; position: absolute; inset: 0;');
  document.body.append(canvas);

  window.addEventListener("resize", Stitch.Browser.Utils.debounce(() => {
    canvas.remove();
    canvas = Stitch.Graphics.getCanvas(pattern, window.innerWidth, window.innerHeight, 5);
    canvas.setAttribute('style', 'margin: auto; position: absolute; inset: 0;');
    document.body.append(canvas);
  }, 10));

  let modal = Stitch.Browser.Modal.createDownloadModal(pattern, 'AutoRouting', 10, 500);
  document.body.appendChild(modal.container);
  window.addEventListener('click', (e) => {
    if (e.target === modal.container) modal.close();
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyD') modal.open();
  });

</script>
</body>
</html>
