<!doctype html>
<html>
<head>
  <title>Polygon Path Finder Test</title>
  <script src="../dist/stitch.global.js"></script>
  <script>window.Stitch || document.write('<script src="https://unpkg.com/@stitchables/stitchjs/dist/stitch.global.js">\x3C/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.2/lib/p5.js"></script>
</head>
<body>
<script>

  const shell = Stitch.Math.Polyline.fromArrays([
    [102, 356], [24, 251], [32, 179], [84, 250], [58, 145], [80, 108], [127, 46],
    [127, 102], [102, 140], [116, 164], [135, 188], [171, 151], [193, 106], [201, 73],
    [233, 57], [232, 86], [225, 112], [240, 116], [256, 94], [279, 73], [320, 85],
    [329, 118], [354, 173], [362, 228], [356, 266], [312, 211], [269, 190], [247, 206],
    [227, 240], [228, 262], [243, 255], [246, 233], [256, 218], [282, 219], [312, 246],
    [323, 268], [331, 301], [319, 325], [290, 356], [248, 362], [216, 357], [205, 337],
    [199, 293], [189, 246], [172, 235], [152, 245], [139, 261], [138, 283], [146, 277],
    [159, 257], [174, 256], [174, 274], [177, 302], [177, 336], [158, 358], [121, 366],
    [102, 356]
  ]).getRounded(10, 0.5).vertices;
  // .getRounded(10, 0.5)
  const holes = [
    [[142, 324], [142, 296], [121, 297], [108, 315], [125, 338], [142, 324]],
    [[206, 139], [194, 150], [203, 166], [217, 146], [206, 139]],
    [[234, 309], [234, 326], [260, 326], [286, 295], [286, 264], [254, 279], [234, 309]]
  ].map(p => Stitch.Math.Polyline.fromArrays(p).getRounded(10, 0.5).vertices);

  // const shell = Stitch.Math.Polyline.fromArrays([
  //   [50, 50], [350, 50], [350, 350], [50, 350], [50, 50]
  // ]).vertices;
  // const holes = [
  //   [[100, 100], [200, 100], [200, 150], [100, 150], [100, 100]],
  //   [[200, 300], [300, 300], [300, 250], [200, 250], [200, 300]]
  // ].map(p => Stitch.Math.Polyline.fromArrays(p).vertices);

  const polygon = Stitch.Geometry.createPolygon(shell, holes);
  let bcd = Stitch.Geometry.getBCD(polygon, 0);
  let index1 = 0;
  let index2 = 0;

  async function setup() {
    createCanvas(400, 400);
    await Stitch.init();
  }

  async function draw() {
    background(0);

    stroke(255);
    strokeWeight(1);
    noFill();
    drawGeom(polygon);

    bcd = Stitch.Geometry.getBCD(polygon, map(mouseX, 0, width, 0, 2 * PI));
    // for (const polygon of bcd.polygons) {
    fill(255, 50);
    drawGeom(bcd.polygons[index1 % bcd.polygons.length]);
    const coordinates = bcd.polygons[index1 % bcd.polygons.length].getCoordinates();
    for (const c of coordinates) circle(c.x, c.y, 5);

    stroke(255, 0, 0);
    strokeWeight(5);
    const c1 = coordinates[index2 % (coordinates.length - 1)];
    const c2 = coordinates[(index2 + 1) % (coordinates.length - 1)];
    line(c1.x, c1.y, c2.x, c2.y);
    // }
  }

  function keyPressed() {
    if (keyCode === 37 || keyCode === 39) index1++;
    if (keyCode === 38 || keyCode === 40) index2++;
  }

  function drawGeom(g) {
    let geomType = g.getGeometryType();
    if (geomType === 'MultiLineString') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'LineString' || geomType === 'LinearRing') {
      beginShape();
      for (let i = 0, n = g.getNumPoints(); i < n; i++) {
        const p = g.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      endShape();
    } else if (geomType === 'Polygon') {
      const shell = g.getExteriorRing();
      beginShape();
      for (let i = 0, n = shell.getNumPoints(); i < n; i++) {
        const p = shell.getPointN(i);
        vertex(p.getX(), p.getY());
      }
      for (let i = 0, n = g.getNumInteriorRing(); i < n; i++) {
        const hole = g.getInteriorRingN(i);
        beginContour();
        for (let j = 0, m = hole.getNumPoints(); j < m; j++) {
          const p = hole.getPointN(j);
          vertex(p.getX(), p.getY());
        }
        endContour(CLOSE);
      }
      endShape(CLOSE);
    } else if (geomType === 'GeometryCollection') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    } else if (geomType === 'Point') {
      const coord = g.getCoordinate();
      circle(coord.x, coord.y, 5);
    } else if (geomType === 'MultiPolygon') {
      for (let i = 0, n = g.getNumGeometries(); i < n; i++) {
        drawGeom(g.getGeometryN(i));
      }
    }
    else {
      console.log(`Unrecognized Geometry Type: ${geomType}`);
    }
  }

</script>
</body>
</html>
