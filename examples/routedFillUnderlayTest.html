<!doctype html>
<html>
<head>
  <title>AutoFill Example</title>
  <script src="../dist/stitch.global.js"></script>
  <script>window.Stitch || document.write('<script src="https://unpkg.com/@stitchables/stitchjs/dist/stitch.global.js">\x3C/script>')</script>
  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.2/lib/p5.js"></script>
</head>
<body>
<script>

  const pattern = new Stitch.Core.Pattern(400, 400);
  const thread = pattern.addThread(200, 0, 0);

  const polygon = {
    shell: [
      new Stitch.Math.Vector( 50,  50), new Stitch.Math.Vector(350,  50),
      new Stitch.Math.Vector(350, 350), new Stitch.Math.Vector( 50, 350),
      new Stitch.Math.Vector( 50,  50),
    ],
    holes: [],
  };

  function addCircleHole(cx, cy, r) {
    const hole = [];
    for (let i = 0; i < 20; i++) {
      const angle = 2 * Math.PI * i / 20;
      hole.push(new Stitch.Math.Vector(cx + r * Math.cos(angle), cy + r * Math.sin(angle)));
    }
    hole.push(hole[0]);
    polygon.holes.push(hole);
  }
  // addCircleHole(200, 200, 145);
  addCircleHole(125, 125, 55);
  addCircleHole(275, 275, 55);
  addCircleHole(125, 275, 55);
  addCircleHole(275, 125, 55);
  addCircleHole(200, 200, 35);



  let stitches;
  async function setup() {
    createCanvas(800, 800);
    await Stitch.init();
    const routedFill = new Stitch.Core.RoutedRuns.RoutedFill(polygon, {
      angle: 0.25 * Math.PI,
      underlays: [{
        rowSpacingMm: 0.2,
        insetMm: 2.5,
      }]
    });
    const autoRoute = new Stitch.Core.RoutedRuns.AutoRoute([routedFill], {
      entry: new Stitch.Math.Vector(0, 0),
      exit: new Stitch.Math.Vector(400, 400),
    });
    thread.addRun(autoRoute);
    stitches = autoRoute.getStitches(5);
  }

  async function draw() {
    background(0);

    translate(400, 400);
    scale(2, 2);
    translate(-200, -200);
    strokeWeight(0.5);

    if (stitches) {
      const stitchLimit = Math.round(map(mouseX, 0, width, 0, stitches.length, true));
      noFill();
      let prev = stitches[0].position;
      for (let i = 1; i < stitchLimit; i++) {
        stroke(map(i, max(stitchLimit - 3, 1), stitchLimit, 255, 0));
        const curr = stitches[i].position;
        line(prev.x, prev.y, curr.x, curr.y);
        prev = curr;
      }
    }
  }

  let modal = Stitch.Browser.Modal.createDownloadModal(pattern, 'AutoRouting', 10, 500);
  document.body.appendChild(modal.container);
  window.addEventListener('click', (e) => { if (e.target === modal.container) modal.close(); });
  window.addEventListener('keydown', (e) => { if (e.code === 'KeyD') modal.open(); });

</script>
</body>
</html>
